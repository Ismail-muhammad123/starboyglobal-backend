openapi: 3.0.3
info:
  title: Starboy Global VTU API Server
  version: 1.0.0
  description: |-
    Comprehensive API Documentation for the Starboy Global VTU Backend.

    This API serves the mobile and web client, handling user authentication, wallets, data/airtime/electricity purchases, referrals, and admin functionality. Interact with the live or local test environments using the server toggles below.
  contact:
    name: API Support Team
    email: support@astar.com
paths:
  /api/account/2fa/resend/:
    post:
      operationId: account_2fa_resend_create
      description: Resend the 2FA OTP code if the user didn't receive it.
      summary: Resend 2FA verification code
      tags:
      - Account - 2FA
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Resend2FARequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Resend2FARequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Resend2FARequestRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
  /api/account/2fa/reset/:
    post:
      operationId: account_2fa_reset_create
      description: Sends a reset code via a specified alternative channel (sms, whatsapp,
        email). Use this when the user cannot receive codes on their primary 2FA channel.
      summary: Request 2FA reset code via alternative channel
      tags:
      - Account - 2FA
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Request2FAResetRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Request2FAResetRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Request2FAResetRequestRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
    put:
      operationId: account_2fa_reset_update
      description: Submit the reset code to disable 2FA on the account. The user can
        then login normally and re-enable 2FA if desired.
      summary: Confirm 2FA reset and disable 2FA
      tags:
      - Account - 2FA
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Confirm2FAResetRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Confirm2FAResetRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Confirm2FAResetRequestRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
