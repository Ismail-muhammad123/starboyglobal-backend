          type: integer
          readOnly: true
        balance:
          type: string
          format: decimal
          pattern: ^-?\d{0,18}(?:\.\d{0,2})?$
        virtual_account:
          type: string
          readOnly: true
      required:
      - id
      - virtual_account
    WalletFundingDetailsResponse:
      type: object
      properties:
        bank_name:
          type: string
        account_number:
          type: string
        account_name:
          type: string
      required:
      - account_name
      - account_number
      - bank_name
    WalletTransaction:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        transaction_type:
          $ref: '#/components/schemas/TransactionTypeEnum'
        description:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time
        initiator:
          $ref: '#/components/schemas/InitiatorEnum'
        sender_account_name:
          type: string
          nullable: true
          maxLength: 200
        sender_account_number:
          type: string
          nullable: true
          maxLength: 20
        sender_bank_name:
          type: string
          nullable: true
          maxLength: 100
        receiver_account_name:
          type: string
          nullable: true
          maxLength: 200
        receiver_account_number:
          type: string
          nullable: true
          maxLength: 20
        receiver_bank_name:
          type: string
          nullable: true
          maxLength: 100
      required:
      - amount
      - id
      - transaction_type
    WalletTransferRequest:
      type: object
      properties:
        recipient_phone:
          type: string
          minLength: 1
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        description:
          type: string
        transaction_pin:
          type: string
          minLength: 4
          maxLength: 4
      required:
      - amount
      - recipient_phone
      - transaction_pin
    WalletTransferResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
      - message
      - success
    WalletsStats:
      type: object
      properties:
        total_balance:
          type: number
          format: double
        total_credits:
          type: number
          format: double
        total_debits:
          type: number
          format: double
      required:
      - total_balance
      - total_credits
      - total_debits
    WithdrawalStats:
      type: object
      properties:
        total_amount:
          type: number
          format: double
        approved_count:
          type: integer
        pending_count:
          type: integer
        rejected_count:
          type: integer
      required:
      - approved_count
      - pending_count
      - rejected_count
      - total_amount
  securitySchemes:
    DeveloperAPIKey:
      type: apiKey
      in: header
      name: X-API-KEY
      description: Developer API key. Pass your live or sandbox key in the `X-API-KEY`
        request header.
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
servers:
- url: https://backend.stardata.com.ng
  description: Production Environment
- url: http://localhost:8000
  description: Local Test Environment
